services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmsaau_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=cmsaau_db;Username=cmsaau;Password=cmsaau_secure_password_2026
      Jwt__Issuer: CmsAau
      Jwt__Audience: CmsAauUsers
      Jwt__Secret: ChangeThisJwtSecretForLocalDockerOnly123456789
      Jwt__ExpiryInMinutes: 15
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - cmsaau_network

  postgres:
    image: postgres:17-alpine
    container_name: cmsaau_postgres
    environment:
      POSTGRES_USER: cmsaau
      POSTGRES_PASSWORD: cmsaau_secure_password_2026
      POSTGRES_DB: cmsaau_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmsaau -d cmsaau_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - cmsaau_network

  redis:
    image: redis:7-alpine
    container_name: cmsaau_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
    networks:
      - cmsaau_network

  minio:
    image: minio/minio:latest
    container_name: cmsaau_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cmsaau_admin
      MINIO_ROOT_PASSWORD: cmsaau_secure_minio_password_2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - cmsaau_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  cmsaau_network:
    driver: bridge
